{% extends 'admin_panel/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-semibold mb-6">Данные гостя</h2>
        
        <div class="mb-4 p-4 bg-blue-50 rounded-lg">
            <p class="text-gray-700">
                <span class="font-semibold">Номер:</span> {{ room.room_number }} ({{ room.room_type.type_name }})<br>
                <span class="font-semibold">Даты:</span> {{ check_in }} — {{ check_out }}<br>
                <span class="font-semibold">Гостей:</span> {{ guests }}
            </p>
        </div>
        
        <form method="POST" action="{% url 'add_booking_final' room.room_id %}">
            {% csrf_token %}
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Фамилия *</label>
                    <input type="text" name="last_name" required class="w-full px-3 py-2 border rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Имя *</label>
                    <input type="text" name="first_name" required class="w-full px-3 py-2 border rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Отчество</label>
                    <input type="text" name="patronymic" class="w-full px-3 py-2 border rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Телефон *</label>
                    <input type="text" name="phone" required class="w-full px-3 py-2 border rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" class="w-full px-3 py-2 border rounded-lg">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Комментарий</label>
                    <textarea name="special_requests" rows="3" class="w-full px-3 py-2 border rounded-lg"></textarea>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 mt-6">
                <a href="{% url 'add_booking_step2' %}" 
                   class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
                    Назад
                </a>
                <button type="submit" 
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Создать бронь
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
