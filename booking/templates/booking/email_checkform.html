{% extends 'booking/base.html' %}

{% block content %}
{% if messages %}
<div class="max-w-2xl mx-auto mb-6">
    {% for message in messages %}
    <div class="p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-400{% elif message.tags == 'success' %}bg-green-100 text-green-700 border border-green-400{% else %}bg-blue-100 text-blue-700 border border-blue-400{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <div class="text-center mb-6">
            <div class="inline-block p-3 bg-green-100 rounded-full mb-4">
                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h3 class="text-xl font-semibold mb-2">Код подтверждения отправлен</h3>
            <p class="text-gray-600">Мы отправили 6-значный код на {{ email }}</p>
        </div>

        <form method="POST" action="{% url 'confirm_booking' %}">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Введите код из письма</label>
                <input type="text" name="confirmation_code" required
                       maxlength="6" pattern="\d{6}"
                       class="w-full px-4 py-2 text-center text-2xl tracking-widest border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                       placeholder="______"
                       autocomplete="off">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition">
                Подтвердить бронирование
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-sm text-gray-500">
                Не пришло письмо?
                <button onclick="alert('В разработке')" class="text-blue-600 hover:underline">
                    Отправить снова
                </button>
            </p>
        </div>
    </div>
</div>
{% endblock %}
