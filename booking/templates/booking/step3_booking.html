{% extends 'booking/base.html' %}

{% block content %}
<div class="grid grid-cols-3 gap-8">
    <!-- Левая колонка - сводка -->
    <div class="col-span-1">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold mb-4">Сводка бронирования</h3>
            <div class="space-y-2 text-gray-600">
                <p><span class="font-medium">Номер:</span> {{ room.room_type.type_name }}</p>
                <!--<p><span class="font-medium">Даты:</span> {{ check_in|date:"Y.d.m" }} - {{ check_out|date:"Y.d.m" }}</p>-->
                <p><span class="font-medium">Ночей:</span> {{ nights }}</p>
                <p><span class="font-medium">Гостей:</span> {{ guests }}</p>
                <p class="text-xl font-bold text-blue-600 mt-4">{{ total_price }} руб.</p>
            </div>
        </div>
    </div>

    <!-- Правая колонка - форма -->
    <div class="col-span-2">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold mb-6">Оформление бронирования</h3>

            <form method="POST" action="{% url 'send_confirmation_code' %}?check_in={{ check_in }}&check_out={{ check_out }}&guests={{ guests }}&total_price={{ total_price }}" onsubmit="return validateForm();">
                {% csrf_token %}
                <input type="hidden" name="room_id" value="{{ room.room_id }}">
                <input type="hidden" name="check_in" value="{{ check_in}}">
                <input type="hidden" name="check_out" value="{{ check_out}}">
                <input type="hidden" name="guests" value="{{ guests }}">
                <input type="hidden" name="total_price" value="{{ total_price }}">

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Фамилия *</label>
                        <input type="text" name="last_name" required
                               value="{{ last_name|default:'' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="Иванов">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Имя *</label>
                        <input type="text" name="first_name" required
                               value="{{ first_name|default:'' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="Иван">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Отчество</label>
                        <input type="text" name="patronymic"
                               value="{{ patronymic|default:'' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="Иванович">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" name="email" id="email"
                               value="{{ email|default:'' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="example@mail.com">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Телефон</label>
                        <input type="tel" name="phone_number" id="phone"
                               value="{{ phone|default:'' }}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                               placeholder="+7 (999) 123-45-67">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Комментарий</label>
                        <textarea name="special_requests" rows="3"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                  placeholder="Дополнительные пожелания...">{% if special_requests %}{{ special_requests }}{% endif %}</textarea>
                    </div>

                    <button type="submit"
                            class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition">
                        Отправить код подтверждения
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Функция валидации формы
    function validateForm() {
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();

        // Проверка: хотя бы одно поле заполнено
        if (!email && !phone) {
            alert('Укажите хотя бы email или номер телефона для связи.');
            return false;
        }

        // Проверка телефона (если он указан)
        if (phone) {
            // Убираем все лишние символы для проверки
            const phoneDigits = phone.replace(/[\s\-\(\)\+]/g, '');

            // Проверяем, что только цифры
            if (!/^\d+$/.test(phoneDigits)) {
                alert('Номер телефона должен содержать только цифры, пробелы, дефисы, скобки и знак +');
                return false;
            }

            // Проверяем длину (должно быть 11 цифр: 7 или 8 + 10 цифр)
            if (phoneDigits.length !== 11) {
                alert('Номер телефона должен содержать 11 цифр (например: +79161234567 или 89161234567)');
                return false;
            }

            // Проверяем, что начинается с 7 или 8
            const firstDigit = phoneDigits[0];
            if (firstDigit !== '7' && firstDigit !== '8') {
                alert('Номер телефона должен начинаться с 7 или 8 (например: +79161234567 или 89161234567)');
                return false;
            }
        }

        return true;
    }

    // Простая маска для телефона
    const phoneInput = document.getElementById('phone');
    if (phoneInput) {
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 1) {
                if (value[0] === '8') {
                    value = '7' + value.substring(1);
                }
            }
            let formatted = '';
            if (value.length > 0) {
                formatted = '+' + value.substring(0, 1);
            }
            if (value.length > 1) {
                formatted += ' (' + value.substring(1, 4);
            }
            if (value.length > 4) {
                formatted += ') ' + value.substring(4, 7);
            }
            if (value.length > 7) {
                formatted += '-' + value.substring(7, 9);
            }
            if (value.length > 9) {
                formatted += '-' + value.substring(9, 11);
            }
            e.target.value = formatted;
        });
    }
</script>
{% endblock %}
