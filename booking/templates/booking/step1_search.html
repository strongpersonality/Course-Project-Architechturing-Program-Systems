{% extends 'booking/base.html' %}

{% block content %}
{% if messages %}
<div class="max-w-2xl mx-auto mb-6">
    {% for message in messages %}
    <div class="p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-400{% elif message.tags == 'success' %}bg-green-100 text-green-700 border border-green-400{% else %}bg-blue-100 text-blue-700 border border-blue-400{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
<div class="bg-white rounded-lg shadow-md p-8">
    <h2 class="text-2xl font-semibold mb-6">Поиск номера</h2>
    
    <form method="GET" action="{% url 'search_rooms' %}" class="space-y-6">
        <!-- Дата заезда -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Дата заезда</label>
            <input type="date" name="check_in" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Дата выезда -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Дата выезда</label>
            <input type="date" name="check_out" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Количество гостей -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Количество гостей</label>
            <select name="guests" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="1">1 гость</option>
                <option value="2">2 гостя</option>
                <option value="3">3 гостя</option>
                <option value="4">4 гостя</option>
            </select>
        </div>

        <div class="g-recaptcha" data-sitekey="6LfCDacsAAAAAG4XKBalniFx2TGAjaAvPpE0S6VE"></div>

        <!-- Кнопка -->
        <button type="submit"
                class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition">
            Найти номер
        </button>
    </form>
</div>
<script>
    function validateDates() {
        const checkIn = document.getElementById('check_in').value;
        const checkOut = document.getElementById('check_out').value;

        if (checkIn && checkOut && checkOut <= checkIn) {
            alert('Дата выезда должна быть позже даты заезда');
            return false;
        }
        return true;
    }
</script>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endblock %}
